; Fast Startup config (Forza Horizon 6 startup skip).
; Skips the startup black-screen hold without touching disk loading.
; F8 toggles the skip off/on. Delete version.dll to uninstall.
[fastboot]

; The startup video file (substring). The skip runs only while this video is on
; screen (from when it opens to when it closes), collapsing the hold timer inside
; that window. No disk-speed guesswork -- works the same on SSDs and slow HDDs.
; If a future game build renames the intro, set this to the new filename.
intro_video = T10_MS_Combined

; How far to push the clock per detected gate (ms). 30s clears the hold.
jump_ms = 30000

; Monitor poll interval (ms).
poll_ms = 80

; The spin threshold is auto-calibrated per machine (relative to the boot's own
; QPC rate), so there is no disk/CPU threshold to tune. The mod always writes a
; small fastboot.log next to the game exe (spin peaks, gate, disarm); delete it
; anytime.

; Optional: after the skip, post Enter to the window to click through the
; press-start prompts and start the game. Off by default. Posts Enter every
; enter_interval_ms, stopping enter_window_ms after the skip.
enter_spammer = 0
enter_interval_ms = 120
enter_window_ms = 12000
