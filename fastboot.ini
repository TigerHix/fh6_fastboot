; Fast Startup config (Forza Horizon 6 startup skip).
; Skips the startup black-screen hold without touching disk loading.
; F8 toggles the skip off/on. Delete version.dll to uninstall.
[fastboot]

; Min QueryPerformanceCounter calls per poll to count as the gate's spin.
; The hold spins ~1.2M/poll; a normal boot is in the hundreds.
qpc_spin_min = 500000

; Disk counts as quiet below this many bytes read over the window below.
; Load-size independent (a rate test).
quiet_bytes = 6000000
quiet_window_polls = 12

; How far to push the clock per detected gate (ms). 30s clears the hold.
jump_ms = 30000

; Monitor poll interval (ms).
poll_ms = 80

; Per-poll diagnostic logging (1/0). Off for normal use; set 1 to debug.
; Gate jumps and disarm are logged when log=1.
diag = 0
log = 1
